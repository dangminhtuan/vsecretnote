<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeCypher - Vietnamese Encoder</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="matrix-canvas-container">
  <div class="fullscreen-backdrop" id="fs-backdrop" onclick="closeFullscreen()"></div>
  <canvas id="matrix-canvas"></canvas>
    </div>
    <div class="app-container">
      <header style="display: flex; justify-content: space-between; align-items: center;">
        <div class="logo-container">
          <h1 class="glitch" data-text="TIMECYPHER">TIMECYPHER</h1>
          <p class="subtitle">Secure Vietnamese-to-Time Encoding Protocol</p>
        </div>
      </header>

      <div class="layout-split">
        <!-- CỘT 1: SIDEBAR GHI CHÚ -->
        <aside class="notes-sidebar">
          <div class="sidebar-header">
            <h2>CIPHER NOTES</h2>
            <div style="display: flex; gap: 5px;">
              <button id="btn-new-note" class="cyber-btn-small">+ NEW</button>
              <button id="btn-playground" class="cyber-btn-small" style="background: #110; color: #ff0; border-color: #880;">SANDBOX</button>
            </div>
          </div>
          <div class="search-container">
            <input type="text" id="search-note" placeholder="Search (VI or Base60)..." spellcheck="false" />
          </div>
          <div class="tabs-container">
            <button class="tab-btn active" data-tab="active">ACTIVE</button>
            <button class="tab-btn" data-tab="archive">ARCHIVE</button>
          </div>
          <div class="note-actions" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;">
            <button id="btn-archive-note" class="cyber-btn-small">ARCHIVE NOTE</button>
            <button id="btn-clone-note" class="cyber-btn-small" style="color: #ffa500; border-color: #ffa500;">CLONE</button>
            <button id="btn-delete-note" class="cyber-btn-small danger">DELETE</button>
            <select id="sel-create-prompt" class="cyber-btn-small" style="background: #000; color: var(--neon-green); border: 1px solid var(--neon-green); cursor: pointer; padding: 2px 5px; flex: 1; min-width: 100px;">
              <option value="" disabled selected>✨ PROMPT</option>
              <option value="square_quote">Make Square Quote</option>
            </select>
          </div>
          
          <div class="sync-actions" style="display: flex; gap: 5px; margin-bottom: 15px;">
            <button id="btn-export-json" class="cyber-btn-small" style="flex:1; background: #000; border-color: #555; color: #aaa;">[EXPORT]</button>
            <button id="btn-import-json" class="cyber-btn-small" style="flex:1; background: #000; border-color: #555; color: #aaa;">[IMPORT]</button>
            <input type="file" id="import-file" style="display:none;" accept=".json" />
          </div>
          <div class="notes-list" id="notes-list">
            <!-- Notes injected by JS -->
          </div>
        </aside>

        <!-- CỘT 2: EDITOR (3 TEXTAREAS + KEYBOARD) -->
        <main class="converter-box editor-box">
            <div class="input-group" style="margin-bottom: 10px;">
              <div class="label-row">
                <label style="color: #ff0;">TAGS & COUNTERS</label>
              </div>
              <div id="note-tags-container" style="display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; min-height: 24px;"></div>
              <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                <select id="tag-icon-preset" class="cyber-input" style="width: 50px; padding: 2px; flex-shrink: 0;">
                  <option value="">-</option>
                  <option value="✅">✅</option>
                  <option value="❌">❌</option>
                  <option value="[ ]">[ ]</option>
                  <option value="🚲">🚲</option>
                  <option value="🎯">🎯</option>
                  <option value="🔥">🔥</option>
                </select>
                <input type="text" id="new-tag-input" list="all-tags-datalist" placeholder="Add tag..." spellcheck="false" style="flex: 1; min-width: 120px;" />
                <button id="btn-add-tag" class="cyber-btn-small" style="padding: 0 10px; flex-shrink: 0;" title="Add normal tag">TAG</button>
                <button id="btn-add-counter" class="cyber-btn-small" style="padding: 0 10px; color: #0f0; border-color: #0f0; flex-shrink: 0;" title="Add countable tag">COUNT</button>
              </div>
              <datalist id="all-tags-datalist"></datalist>
            </div>

            <!-- Relations -->
            <div class="input-group" style="margin-bottom: 5px;">
              <div class="label-row" style="margin-bottom: 5px;">
                <label style="color: #0ff;">RELATIONS</label>
              </div>
              <div id="note-relations-container" style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 5px;"></div>
              
              <div style="display: flex; gap: 5px; flex-wrap: wrap; align-items: center;">
                <input type="text" id="relation-type-input" list="relation-types-datalist" placeholder="Type..." class="cyber-input" style="width: 80px; padding: 2px; flex-shrink: 0; height: 24px;" />
                <datalist id="relation-types-datalist">
                  <option value="Giải thích"></option>
                  <option value="Ví dụ"></option>
                  <option value="Nâng cấp từ"></option>
                  <option value="Liên quan"></option>
                </datalist>
                
                <button id="btn-link-prev" class="cyber-btn-small" title="Link to previous note" style="padding: 0 5px; height: 24px; flex-shrink: 0;">[PREV]</button>
                <select id="sel-target-note" class="cyber-select" style="flex: 1; min-width: 100px; height: 24px; padding: 0 5px;">
                  <option value="">-- Target Note --</option>
                </select>
                <button id="btn-add-relation" class="cyber-btn-small" style="padding: 0 10px; color: #0ff; border-color: #0ff; height: 24px; flex-shrink: 0;">ADD</button>
              </div>
            </div>
            <div id="backlinks-container" style="display: none; margin-bottom: 15px;">
              <div id="backlinks-list"></div>
            </div>

          <!-- Text Decrypted -->
          <div class="input-group">
            <div class="label-row">
              <label for="text-input">TEXT DECRYPTED [VI/EN]</label>
              <div class="action-btns">
                <button id="btn-copy-text" class="copy-btn">COPY</button>
                <button id="btn-clear-text" class="copy-btn clear-btn">CLEAR</button>
                <button class="copy-btn btn-fullscreen" onclick="toggleFullscreen(this)">⤢</button>
              </div>
            </div>
            <textarea id="text-input" placeholder="Nhập văn bản cần mã hóa..." spellcheck="false"></textarea>
          </div>
          
          <div class="controls">
            <button id="btn-encode" class="cyber-btn"><span class="btn-text">ENCODE &darr;</span></button>
            <button id="btn-decode" class="cyber-btn"><span class="btn-text">DECODE &uarr;</span></button>
          </div>

          <!-- Time Encrypted -->
          <div class="input-group">
            <div class="label-row">
              <label for="time-input">TIME ENCRYPTED [HH:MM:SS]</label>
              <div class="action-btns">
                <button id="btn-copy-time" class="copy-btn">COPY</button>
                <button id="btn-clear-time" class="copy-btn clear-btn">CLEAR</button>
                <button class="copy-btn btn-fullscreen" onclick="toggleFullscreen(this)">⤢</button>
              </div>
            </div>
            <textarea id="time-input" placeholder="Mã thời gian..." spellcheck="false"></textarea>
          </div>

          <!-- Compressed Base60 -->
          <div class="input-group compressed-group">
            <div class="label-row">
              <label for="compressed-input">COMPRESSED CODE [BASE60]</label>
              <div class="action-btns">
                <button id="btn-copy-compressed" class="copy-btn">COPY</button>
                <button id="btn-clear-compressed" class="copy-btn clear-btn">CLEAR</button>
                <button class="copy-btn btn-fullscreen" onclick="toggleFullscreen(this)">⤢</button>
              </div>
            </div>
            <textarea id="compressed-input" placeholder="Mã nén siêu ngắn..." spellcheck="false"></textarea>
          </div>

        </main>

        <!-- CỘT 3: BREAKDOWN LOG -->
        <section class="breakdown-box">
          <h2 class="dict-title">TRANSLATION LOG</h2>
          <div class="breakdown-list" id="breakdown-list">
             <!-- JS will populate this -->
          </div>
        </section>

        <!-- BẢNG TỪ ĐIỂN -->
        <section class="dictionary-box" style="position: relative;">
          <div style="display:flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 15px; width: 100%;">
             <h2 class="dict-title" style="margin-bottom:0;">DICTIONARY MATRIX</h2>
             <button id="btn-search-dict" class="cyber-btn" style="background: #000; color: var(--neon-green); border: 1px solid var(--neon-green); cursor: pointer; padding: 5px 15px; font-weight: bold; border-radius: 4px; white-space: nowrap;">
               🔍 TRA TỪ NỮA</button>
             <div class="dict-controls" style="display:flex; flex-direction: column; gap: 10px; width: 100%;">
               <select id="sel-dict-mode" class="cyber-select" style="width: 100%;">
                 <option value="base">Chế độ: Phụ âm & Vần</option>
                 <option value="two-digit">Chế độ: Từ 2 số (00-99)</option>
                 <option value="short-words">Chế độ: Từ siêu ngắn (Ngoại lệ)</option>
                 <option value="english">Chế độ: Tiếng Anh & Phím tắt</option>
               </select>
               <div id="dict-sub-controls" style="display:flex; flex-wrap: wrap; gap: 10px;">
                 <select id="sel-consonant" class="cyber-select">
                   <option value="base">Phụ âm: CƠ BẢN (24)</option>
                   <option value="extra">Phụ âm: MỞ RỘNG (8)</option>
                 </select>
                 <select id="sel-rhyme" class="cyber-select">
                   <option value="base">Vần: CƠ BẢN (60)</option>
                   <option value="extra1">Vần: MỞ RỘNG 1 (60)</option>
                   <option value="extra2">Vần: MỞ RỘNG 2 (35)</option>
                 </select>
                 <select id="sel-short-block" class="cyber-select" style="display:none;"></select>
               </div>
             </div>
          </div>
          <div class="consonant-grid" id="consonant-grid">
            <!-- Consonants injected by JS -->
          </div>
          <div class="rhyme-matrix" id="rhyme-matrix">
            <div class="matrix-placeholder">SELECT A CONSONANT TO INITIALIZE MATRIX...</div>
          </div>
        </section>
      </div>

      <div id="status-panel" class="status-panel">
        <span class="status-indicator"></span> SYSTEM ONLINE. WAITING FOR INPUT...
      </div>
    </div>
    <script type="module" src="/main.js"></script>
    <script type="module" src="/keyboard.js"></script>

    <!-- CYBER MODAL SYSTEM -->
    <div id="cyber-modal" class="cyber-modal-overlay" style="display: none;">
      <div class="cyber-modal-box">
        <div class="cyber-modal-header">[ SYSTEM MESSAGE ]</div>
                <div id="cyber-modal-content" class="cyber-modal-content" style="position: relative;">
          <!-- Txt Base60 Interactive -->
          <div id="cyber-modal-interactive-b60" class="modal-interactive-container"></div>
          <!-- Tooltip -->
          <div id="cyber-modal-word-tooltip" class="cyber-tooltip" style="display: none;"></div>
        </div>
      </div>
        <div class="cyber-modal-actions">
          <button id="cyber-modal-btn-no" class="cyber-btn-small" style="display: none; border-color: #ff5555; color: #ff5555;">[ CANCEL ]</button>
          <button id="cyber-modal-btn-yes" class="cyber-btn-small" style="background: #0f0; color: #000;">[ OK ]</button>
        </div>
      </div>
    </div>
  
  <div id="lookup-modal" class="cyber-modal-overlay" style="display: none;">
    <div class="cyber-modal-box" style="margin: auto; max-width: 500px; width: 90%; border: 2px solid var(--neon-green); background: #050505; color: var(--neon-green); font-family: 'Fira Code', monospace; box-shadow: 0 0 15px var(--neon-green); position: relative;">
      <span id="close-lookup" class="close-btn" style="position: absolute; right: 10px; top: 10px; cursor: pointer; font-size: 20px;">&times;</span>
      <h2 style="text-align: center; margin-top: 20px; border-bottom: 1px solid var(--neon-green); padding-bottom: 10px;">TRA CỨU TỪ ĐIỂN</h2>
      
      <div style="padding: 20px;">
        <input type="text" id="lookup-input" class="cyber-input" placeholder="Nhập từ cần tra (vd: đá)..." style="width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 15px; font-size: 16px; border: 1px solid var(--neon-green); background: #000; color: #fff;">
        
        <div id="lookup-results" style="min-height: 200px;">
          <!-- Results injected here -->
        </div>
      </div>
    </div>
  </div>

</body>
</html>
